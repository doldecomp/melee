name: "Style Check"

on: [push, pull_request]

permissions:
  contents: read

jobs:
  style-check:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v6

    - name: Test the checker
      run: python3 tools/test_check.py

    - name: Run style checks
      # Patterns flagged here were swept out of the tree, so any finding is
      # newly introduced. Non-blocking: findings are emitted as inline
      # warning annotations (rc 1); only an internal error (rc >= 2) fails
      # the step. To make a check blocking, fail on rc 1 too. The checker
      # only reads source text and never executes repository code.
      run: |
        rc=0
        python3 tools/check.py --msg-style actions src || rc=$?
        if [ "$rc" -ge 2 ]; then
          exit "$rc"
        fi
